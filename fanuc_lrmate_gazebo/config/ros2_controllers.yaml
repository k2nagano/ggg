controller_manager:
  ros__parameters:
    update_rate: 1000

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_trajectory_controller:
  ros__parameters:
    joints:
      - J1
      - J2
      - J3
      - J4
      - J5
      - J6

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: false

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 1.0

      J1:
        trajectory: 0.2
        goal: 0.1
      J2:
        trajectory: 0.2
        goal: 0.1
      J3:
        trajectory: 0.2
        goal: 0.1
      J4:
        trajectory: 0.2
        goal: 0.1
      J5:
        trajectory: 0.2
        goal: 0.1
      J6:
        trajectory: 0.2
        goal: 0.1
